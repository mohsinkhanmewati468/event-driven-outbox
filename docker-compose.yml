version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init:
    image: mongo:6
    depends_on:
      - mongo
    restart: "no"
    entrypoint: >
      bash -c "
        sleep 10;
        mongosh --host mongo:27017 <<EOF
        rs.initiate({
          _id: 'rs0',
          members: [{ _id: 0, host: 'mongo:27017' }]
        })
        EOF
      "

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      - MONGO_URI=mongodb://mongo:27017/task-assignment?replicaSet=rs0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=development

  relay-worker:
    build: ./auth-service
    container_name: relay-worker
    restart: always
    command: npm run worker
    depends_on:
      - mongo
      - rabbitmq
    environment:
      - MONGO_URI=mongodb://mongo:27017/task-assignment?replicaSet=rs0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672

  todo-service:
    build: ./todo-service
    container_name: todo-service
    restart: always
    depends_on:
      - mongo
      - rabbitmq
    environment:
      - MONGO_URI=mongodb://mongo:27017/task-assignment?replicaSet=rs0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672

volumes:
  mongo_data:
